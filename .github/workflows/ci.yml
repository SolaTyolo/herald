name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: herald
          POSTGRES_PASSWORD: herald
          POSTGRES_DB: herald
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test (file store)
        env:
          DEV_MODE: "true"
          STORE_TYPE: file
          STORE_FILE_PATH: /tmp/herald-test-data
        run: go test ./... -count=1 -race

      - name: Test (postgres gorm)
        env:
          DEV_MODE: "true"
          STORE_TYPE: db
          DB_DRIVER: postgres
          DATABASE_URL: postgres://herald:herald@localhost:5432/herald?sslmode=disable
        run: go test ./... -count=1

      - name: Build
        run: |
          go build -o /tmp/herald-api ./cmd/api
          go build -o /tmp/herald-worker ./cmd/worker
